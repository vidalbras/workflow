services:
  - type: web
    name: workflow-kanban
    env: node
    region: oregon
    plan: free
    buildCommand: |
      cd frontend && npm install && npm run build &&
      cd ../backend && npm install && npx prisma generate && npm run build &&
      cp -r ../frontend/dist ./dist/public
    startCommand: cd backend && npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: workflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

databases:
  - name: workflow-db
    plan: free
    region: oregon
